<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>戲劇_電影OnSet出班費用計算</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5fL8Kg7AIgea2zgO4RBjuADUvVB-1xkw",
  authDomain: "onset-calculator-film.firebaseapp.com",
  projectId: "onset-calculator-film",
  storageBucket: "onset-calculator-film.firebasestorage.app",
  messagingSenderId: "926056753375",
  appId: "1:926056753375:web:451ad3eb22762c7b9aa16a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DATA_DOC = doc(db, 'app', 'data');

window.saveToFirebase = async function() {
  try {
    await setDoc(DATA_DOC, {
      members:  window._state.members,
      projects: window._state.projects,
      records:  window._state.records,
      formulae: window._state.formulae,
      updatedAt: Date.now()
    });
    const el = document.getElementById('save-indicator');
    if (el) { el.textContent = '✓ 已同步至雲端'; el.style.color='#0F6E56'; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }
  } catch(e) {
    console.error('Save error:', e);
    const el = document.getElementById('save-indicator');
    if (el) { el.textContent = '⚠ 同步失敗'; el.style.color='#A32D2D'; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3000); }
  }
};

let isFirstLoad = true;
onSnapshot(DATA_DOC, (snap) => {
  const ov = document.getElementById('loading-overlay');
  if (ov) ov.style.display = 'none';

  if (!snap.exists()) {
    window.saveToFirebase();
    document.getElementById('sync-status').textContent = '雲端資料庫已就緒';
    isFirstLoad = false;
    return;
  }
  const data = snap.data();
  window._state.members  = data.members  || [];
  window._state.projects = data.projects || [];
  window._state.records  = data.records  || {};
  window._state.formulae = data.formulae || window._DEFAULT_FORMULAE();
  if (!window._state.formulae.A) window._state.formulae.A = window._DEFAULT_FORMULAE().A;
  if (!window._state.formulae.B) window._state.formulae.B = window._DEFAULT_FORMULAE().B;

  document.getElementById('sync-status').textContent = isFirstLoad ? '雲端資料已載入' : '已同步最新資料';
  isFirstLoad = false;

  renderCalendar();
  renderMembers();
  renderFormulaContent();
  updateSummaryProjectFilter();
  updateStorageInfo();
  if (window._activeTab === 'summary') renderSummary();
}, (err) => {
  console.error('Firebase error:', err);
  const ov = document.getElementById('loading-overlay');
  if (ov) { ov.querySelector('.loading-text').textContent = '⚠ 無法連線，請重新整理頁面'; }
  document.getElementById('sync-status').textContent = '⚠ 連線失敗';
});
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--surface:#fff;--surface2:#f2f1ee;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --green:#0F6E56;--green-light:#E1F5EE;
  --red:#A32D2D;--red-light:#FCEBEB;
  --purple:#534AB7;--teal:#0F6E56;--teal-light:#E1F5EE;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
.loading-overlay{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text2)}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:50}
.header-title{font-size:14px;font-weight:600}
.header-spacer{flex:1}
.save-indicator{font-size:11px;font-weight:500;display:none}
.save-indicator.show{display:inline}
.sync-bar{display:flex;align-items:center;gap:10px;padding:6px 24px;background:#f0f7ff;border-bottom:1px solid #b5d4f4;font-size:11px;color:var(--blue)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#378ADD;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#sync-status{color:var(--text2)}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;transition:all 0.15s;font-family:inherit;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.main{max-width:1100px;margin:0 auto;padding:24px}
.panel{display:none}
.panel.active{display:block}
.cal-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.cal-nav-group{display:flex;align-items:center;gap:12px}
.cal-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px 12px;cursor:pointer;font-size:14px;color:var(--text);font-family:inherit}
.cal-btn:hover{background:var(--surface2)}
.cal-month-title{font-size:16px;font-weight:600;min-width:120px;text-align:center}
.legend{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:50%}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:6px 0;letter-spacing:0.05em}
.cal-day{min-height:82px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:7px;cursor:pointer;transition:all 0.12s;overflow:hidden}
.cal-day:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,0.06);transform:translateY(-1px)}
.cal-day.other-month{opacity:0.3;pointer-events:none;background:var(--surface2)}
.cal-day.weekend{background:#fffbf3}
.cal-day.has-records{border-color:#378ADD}
.day-num{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:3px;display:inline-block}
.today-dot{background:var(--text);color:white;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.day-records{display:flex;flex-direction:column;gap:2px;margin-top:2px}
.day-chip{font-size:9px;border-radius:4px;padding:1px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.chip-A{background:#EEEDFE;color:#534AB7}
.chip-B{background:#E6F1FB;color:#185FA5}
.chip-PM{background:#E1F5EE;color:#0F6E56}
.chip-C{background:#F1EFE8;color:#5F5E5A}
.day-more{font-size:10px;color:var(--text3)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:24px;width:500px;max-width:96vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text2);padding:2px 6px;border-radius:6px;font-family:inherit}
.modal-close:hover{background:var(--surface2)}
.record-item{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.record-item:last-of-type{border-bottom:none}
.record-main{flex:1;min-width:0}
.record-name-row{display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap}
.record-name{font-size:13px;font-weight:600}
.record-meta{font-size:11px;color:var(--text3)}
.record-project-tag{font-size:10px;background:var(--teal-light);color:var(--teal);border-radius:4px;padding:1px 6px;font-weight:500}
.record-pay{font-size:13px;font-weight:700;color:var(--blue);white-space:nowrap;padding-top:2px}
.record-del{background:none;border:none;cursor:pointer;color:var(--red);font-size:16px;padding:2px 6px;border-radius:6px;flex-shrink:0}
.record-del:hover{background:var(--red-light)}
.add-area{margin-top:16px;border-top:1px solid var(--border);padding-top:16px}
.add-area-title{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em}
.add-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.add-full{grid-column:1/-1}
.field-label{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500}
.field-input{width:100%;border:1px solid var(--border2);border-radius:var(--radius);padding:7px 10px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text)}
.field-input:focus{outline:none;border-color:var(--blue)}
.computed-display{font-size:12px;color:var(--blue);font-weight:500;min-height:18px;padding:4px 0}
.badge{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.b-A{background:#EEEDFE;color:#534AB7}
.b-B{background:#E6F1FB;color:#185FA5}
.b-C{background:#F1EFE8;color:#5F5E5A}
.b-amber{background:var(--amber-light);color:var(--amber)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px}
.stat-label{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:0.04em;margin-bottom:6px;text-transform:uppercase}
.stat-value{font-size:24px;font-weight:600;line-height:1}
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;flex-wrap:wrap}
.filter-label{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap}
.filter-select{border:1px solid var(--border2);border-radius:var(--radius);padding:6px 10px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);min-width:180px}
.filter-select:focus{outline:none;border-color:var(--blue)}
.filter-spacer{flex:1}
.active-filter-badge{font-size:11px;background:var(--teal-light);color:var(--teal);border-radius:20px;padding:3px 10px;font-weight:600}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.section-title{font-size:14px;font-weight:600}
.btn-export{background:var(--green);color:white;border:none;border-radius:var(--radius);padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.btn-export:hover{opacity:0.85}
.data-table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border)}
.data-table th{text-align:left;padding:10px 14px;background:var(--surface2);font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;border-bottom:1px solid var(--border)}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.data-table tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:var(--surface2)}
.pay-cell{font-weight:700;color:var(--blue)}
.note-cell{font-size:11px;color:var(--amber)}
.grade-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.grade-tab{padding:6px 18px;border-radius:20px;border:1px solid var(--border2);font-size:13px;cursor:pointer;background:none;font-family:inherit;color:var(--text2);transition:all 0.15s}
.grade-tab:hover{background:var(--surface2)}
.grade-tab.active-A{background:#EEEDFE;color:#534AB7;border-color:#AFA9EC;font-weight:600}
.grade-tab.active-B{background:#E6F1FB;color:#185FA5;border-color:#85B7EB;font-weight:600}
.grade-tab.active-C{background:#F1EFE8;color:#5F5E5A;border-color:#B4B2A9;font-weight:600}
.formula-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px}
.formula-card h4{font-size:12px;font-weight:600;margin-bottom:14px;color:var(--text3);letter-spacing:0.04em;text-transform:uppercase}
.f-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.f-row:last-child{margin-bottom:0}
.f-label{font-size:13px;color:var(--text);min-width:140px}
.f-input{border:1px solid var(--border2);border-radius:var(--radius);padding:6px 10px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);width:90px}
.f-input:focus{outline:none;border-color:var(--blue)}
.f-unit{font-size:12px;color:var(--text3)}
.preview-card{background:#f0f7ff;border:1px solid #b5d4f4;border-radius:var(--radius-lg);padding:18px;margin-bottom:16px}
.preview-card h4{font-size:13px;font-weight:600;color:var(--blue);margin-bottom:10px}
.preview-row{font-size:13px;color:#185FA5;padding:3px 0}
.preview-row b{font-weight:700}
.preview-note{font-size:11px;color:#854F0B;margin-top:10px;background:#fffbf3;border-radius:6px;padding:8px 12px;line-height:1.7}
.btn-save{background:var(--text);color:white;border:none;border-radius:var(--radius);padding:9px 22px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.btn-save:hover{opacity:0.8}
.save-ok{font-size:12px;color:var(--green);margin-left:10px;display:none;font-weight:500}
.grade-section{margin-bottom:28px}
.grade-section-title{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.grade-section-label{font-size:14px;font-weight:600}
.grade-desc{font-size:12px;color:var(--text3)}
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:12px}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.mcard-name{font-size:13px;font-weight:500}
.mcard-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:2px 6px;border-radius:6px;line-height:1}
.mcard-del:hover{background:var(--red-light);color:var(--red)}
.add-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-top:8px}
.add-wrap-title{font-size:13px;font-weight:500;margin-bottom:10px}
.add-row-flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.add-row-flex input,.add-row-flex select{border:1px solid var(--border2);border-radius:var(--radius);padding:8px 12px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text)}
.add-row-flex input{min-width:160px}
.add-row-flex input:focus,.add-row-flex select:focus{outline:none;border-color:var(--blue)}
.btn-primary{background:var(--text);color:white;border:none;border-radius:var(--radius);padding:8px 16px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.btn-primary:hover{opacity:0.8}
.info-box{font-size:12px;color:var(--text3);padding:12px 14px;background:var(--surface2);border-radius:var(--radius);margin-top:16px;line-height:1.8}
.empty-state{text-align:center;padding:28px;color:var(--text3);font-size:13px}
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:16px}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:10px}
.pcard-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pcard-info{flex:1;min-width:0}
.pcard-name{font-size:13px;font-weight:600}
.pcard-count{font-size:11px;color:var(--text3);margin-top:1px}
.pcard-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:2px 6px;border-radius:6px;line-height:1}
.pcard-del:hover{background:var(--red-light);color:var(--red)}
.subtabs{display:flex;margin-bottom:20px;background:var(--surface2);border-radius:var(--radius-lg);padding:4px;width:fit-content}
.subtab{padding:7px 18px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text2);border-radius:var(--radius);font-family:inherit;transition:all 0.15s}
.subtab.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
#storage-info{font-size:11px;color:var(--text3)}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">連線至雲端資料庫中…</div>
</div>

<div class="header">
  <div class="header-title">🎬 戲劇_電影OnSet出班費用計算</div>
  <div class="header-spacer"></div>
  <span class="save-indicator" id="save-indicator"></span>
  <div id="header-period" style="font-size:12px;color:var(--text3);margin-left:8px;"></div>
</div>

<div class="sync-bar">
  <div class="sync-dot"></div>
  <span>即時雲端同步 — 所有人看到同一份資料</span>
  <span id="sync-status" style="margin-left:8px;">連線中…</span>
  <div style="flex:1"></div>
  <span id="storage-info"></span>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('calendar')">📅 日曆</button>
  <button class="tab" onclick="switchTab('summary')">📊 匯總</button>
  <button class="tab" onclick="switchTab('formula')">⚙️ 獎金公式</button>
  <button class="tab" onclick="switchTab('manage')">👥 人員 &amp; 專案管理</button>
</div>

<div class="main">
  <div class="panel active" id="tab-calendar">
    <div class="cal-toolbar">
      <div class="cal-nav-group">
        <button class="cal-btn" onclick="changeMonth(-1)">&#8249; 上月</button>
        <div class="cal-month-title" id="cal-title"></div>
        <button class="cal-btn" onclick="changeMonth(1)">下月 &#8250;</button>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#534AB7;"></div>A 級</div>
        <div class="legend-item"><div class="legend-dot" style="background:#378ADD;"></div>B 級</div>
        <div class="legend-item"><div class="legend-dot" style="background:#0F6E56;"></div>PM</div>
        <div class="legend-item"><div class="legend-dot" style="background:#888780;"></div>C 級</div>
        <div class="legend-item"><div class="legend-dot" style="background:#EF9F27;"></div>週末</div>
        <div class="legend-item"><div style="width:14px;height:14px;border-radius:3px;border:2px solid #378ADD;"></div>有記錄</div>
      </div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="panel" id="tab-summary">
    <div class="filter-bar">
      <span class="filter-label">篩選專案</span>
      <select class="filter-select" id="summary-project-filter" onchange="renderSummary()"><option value="">全部專案</option></select>
      <div class="filter-spacer"></div>
      <div id="active-filter-display"></div>
    </div>
    <div class="stat-grid" id="summary-stats"></div>
    <div class="section-header">
      <div class="section-title" id="summary-table-title">各人員出班明細</div>
      <button class="btn-export" onclick="exportExcel()">&#8595; 匯出 Excel</button>
    </div>
    <table class="data-table">
      <thead><tr><th>姓名</th><th>等級</th><th>專案</th><th>出班天數</th><th>總工時</th><th>週末工時</th><th>應付獎金</th><th>備註</th></tr></thead>
      <tbody id="summary-body"></tbody>
    </table>
  </div>

  <div class="panel" id="tab-formula">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;">各等級獎金公式設定</div>
    <div class="grade-tabs">
      <button class="grade-tab active-A" id="ftab-A" onclick="switchFormulaTab('A')">A 級</button>
      <button class="grade-tab" id="ftab-B" onclick="switchFormulaTab('B')">B 級</button>
      <button class="grade-tab" id="ftab-C" onclick="switchFormulaTab('C')">C 級（見習）</button>
    </div>
    <div id="formula-content"></div>
  </div>

  <div class="panel" id="tab-manage">
    <div class="subtabs">
      <button class="subtab active" id="subtab-members" onclick="switchSubtab('members')">👥 人員管理</button>
      <button class="subtab" id="subtab-projects" onclick="switchSubtab('projects')">🎬 專案管理</button>
    </div>
    <div id="subpanel-members">
      <div class="grade-section">
        <div class="grade-section-title"><span class="badge" style="font-size:12px;padding:4px 12px;background:#E1F5EE;color:#0F6E56;font-weight:600;">PM</span><span class="grade-section-label">專案經理</span><span class="grade-desc">獎金照 A 級計算</span></div>
        <div class="member-grid" id="members-PM"></div>
      </div>
      <div class="grade-section">
        <div class="grade-section-title"><span class="badge b-A" style="font-size:12px;padding:4px 12px;">A 級</span><span class="grade-section-label">監督與協調</span></div>
        <div class="member-grid" id="members-A"></div>
      </div>
      <div class="grade-section">
        <div class="grade-section-title"><span class="badge b-B" style="font-size:12px;padding:4px 12px;">B 級</span><span class="grade-section-label">正式執行人員</span></div>
        <div class="member-grid" id="members-B"></div>
      </div>
      <div class="grade-section">
        <div class="grade-section-title"><span class="badge b-C" style="font-size:12px;padding:4px 12px;">C 級</span><span class="grade-section-label">見習階段</span></div>
        <div class="member-grid" id="members-C"></div>
      </div>
      <div class="add-wrap">
        <div class="add-wrap-title">新增人員</div>
        <div class="add-row-flex">
          <input type="text" id="new-member-name" placeholder="輸入姓名" />
          <select id="new-member-grade">
            <option value="A">A 級｜監督協調</option>
            <option value="B" selected>B 級｜正式執行</option>
            <option value="C">C 級｜見習</option>
            <option value="PM">PM｜專案經理（照 A 級計算）</option>
          </select>
          <button class="btn-primary" onclick="addMember()">新增</button>
        </div>
      </div>
      <div class="info-box">C 級累積 3 天（或 30 小時）且能獨立協助現場，經 Sup 認定後可升至 B 級。C 級不發放獎金，依補休制度執行。</div>
    </div>
    <div id="subpanel-projects" style="display:none;">
      <div style="font-size:14px;font-weight:600;margin-bottom:4px;">專案列表</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:16px;">新增後可在日曆記錄時選擇，以及在匯總頁篩選</div>
      <div class="project-grid" id="project-grid"></div>
      <div class="add-wrap">
        <div class="add-wrap-title">新增專案</div>
        <div class="add-row-flex">
          <input type="text" id="new-project-name" placeholder="輸入專案名稱" style="min-width:260px;" />
          <button class="btn-primary" onclick="addProject()">新增</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title"></div>
        <div id="modal-badges" style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap;"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">&#215;</button>
    </div>
    <div id="modal-records"></div>
    <div class="add-area">
      <div class="add-area-title">新增出班記錄</div>
      <div class="add-grid">
        <div class="add-full"><div class="field-label">人員</div><select class="field-input" id="m-name" onchange="updateComputed()"></select></div>
        <div class="add-full"><div class="field-label">專案</div><select class="field-input" id="m-project"></select></div>
        <div><div class="field-label">開工時間</div><input type="time" class="field-input" id="m-start" value="08:00" oninput="updateComputed()" /></div>
        <div><div class="field-label">收工時間</div><input type="time" class="field-input" id="m-end" value="18:00" oninput="updateComputed()" /></div>
        <div class="add-full"><div class="computed-display" id="computed-display"></div></div>
      </div>
      <button class="btn-primary" onclick="addRecord()" style="width:100%;padding:9px;">新增出班記錄</button>
    </div>
  </div>
</div>

<script>
window._DEFAULT_FORMULAE=()=>({A:{baseDay:1000,halfDayMax:4,fullDayMin:5,fullDayHours:9,weekendMult:2},B:{baseDay:1000,halfDayMax:4,fullDayMin:5,fullDayHours:9,weekendMult:2}});
window._state={members:[],projects:[],records:{},formulae:window._DEFAULT_FORMULAE()};
window._activeTab='calendar';
const today=new Date();
let viewMonth=new Date(today.getFullYear(),today.getMonth(),1);
let activeDay=null,activeFormulaGrade='A',activeSubtab='members';
const MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const DOWS=['日','一','二','三','四','五','六'];
const PCOLORS=['#534AB7','#185FA5','#0F6E56','#854F0B','#A32D2D','#5F5E5A'];
function isWk(d){return d.getDay()===0||d.getDay()===6}
function dKey(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function kToD(k){const p=k.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function tDiff(s,e){const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);let m=(eh*60+em)-(sh*60+sm);if(m<=0)m+=1440;return+(m/60).toFixed(2)}
function newPid(){return'p'+Date.now()}
function pName(pid){const p=window._state.projects.find(x=>x.id===pid);return p?p.name:'（未指定）'}
function eGrade(g){return g==='PM'?'A':g}
function pColor(i){return PCOLORS[i%PCOLORS.length]}
function calcBonus(h,g,date){
  if(g==='C')return{bonus:0,note:'補休制度，不計獎金'};
  const f=window._state.formulae[eGrade(g)];if(!f)return{bonus:0,note:''};
  const base=f.baseDay,wk=isWk(date);
  let u=0;
  if(h<=f.halfDayMax)u=0.5;
  else if(h<=f.fullDayHours)u=1;
  else{u=1;const ex=h-f.fullDayHours;if(ex>1)u+=0.5;if(ex>f.fullDayHours+1)u+=0.5;if(ex>f.fullDayHours*2+1)u+=0.5}
  let bonus=base*u,note='';
  if(wk){bonus*=f.weekendMult;note=`假日 ×${f.weekendMult}，另補休 1 日`}
  return{bonus:Math.round(bonus),note}
}
function gLabel(g){
  if(g==='A')return`<span class="badge b-A">A 級</span>`;
  if(g==='B')return`<span class="badge b-B">B 級</span>`;
  if(g==='PM')return`<span class="badge" style="background:#E1F5EE;color:#0F6E56;font-weight:600;">PM</span>`;
  return`<span class="badge b-C">C 級</span>`
}
function updateStorageInfo(){
  const r=Object.values(window._state.records).reduce((a,v)=>a+v.length,0);
  document.getElementById('storage-info').textContent=`${window._state.members.length} 人員 · ${window._state.projects.length} 專案 · ${r} 筆記錄`
}
function save(){if(window.saveToFirebase)window.saveToFirebase()}

function renderCalendar(){
  const ov=document.getElementById('loading-overlay');if(ov)ov.style.display='none';
  const y=viewMonth.getFullYear(),m=viewMonth.getMonth();
  document.getElementById('cal-title').textContent=`${y} 年 ${MONTHS[m]}`;
  document.getElementById('header-period').textContent=`${y} / ${m+1}`;
  const first=new Date(y,m,1),last=new Date(y,m+1,0),sd=first.getDay();
  let html=DOWS.map((d,i)=>`<div class="cal-dow" style="${i===0?'color:#c0392b':i===6?'color:#2563eb':''}">${d}</div>`).join('');
  for(let i=0;i<sd;i++){const d2=new Date(y,m,1-sd+i);html+=`<div class="cal-day other-month"><div class="day-num">${d2.getDate()}</div></div>`}
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(y,m,d),key=dKey(date),wk=isWk(date);
    const recs=window._state.records[key]||[];
    const isToday=date.toDateString()===today.toDateString();
    let cls='cal-day';if(wk)cls+=' weekend';if(recs.length)cls+=' has-records';if(isToday)cls+=' today';
    const dw=date.getDay(),nc=dw===0?'color:#c0392b':dw===6?'color:#2563eb':'color:var(--text2)';
    const ne=isToday?`<span class="day-num today-dot" style="${nc}">${d}</span>`:`<span class="day-num" style="${nc}">${d}</span>`;
    let chips='';
    recs.slice(0,3).forEach(r=>{const cc=r.grade==='A'?'chip-A':r.grade==='B'?'chip-B':r.grade==='PM'?'chip-PM':'chip-C';chips+=`<div class="day-chip ${cc}">${r.name} ${r.startTime}–${r.endTime}</div>`});
    if(recs.length>3)chips+=`<div class="day-more">+${recs.length-3} 人</div>`;
    html+=`<div class="${cls}" onclick="openDay('${key}')">${ne}<div class="day-records">${chips}</div></div>`
  }
  const rem=(7-(sd+last.getDate())%7)%7;
  for(let i=1;i<=rem;i++)html+=`<div class="cal-day other-month"><div class="day-num">${i}</div></div>`;
  document.getElementById('cal-grid').innerHTML=html
}
function changeMonth(d){viewMonth.setMonth(viewMonth.getMonth()+d);renderCalendar()}

function openDay(key){
  activeDay=key;
  const date=kToD(key),dow=DOWS[date.getDay()],wk=isWk(date);
  document.getElementById('modal-title').textContent=`${key}（${dow}）`;
  document.getElementById('modal-badges').innerHTML=wk?`<span class="badge b-amber">週末 ×${window._state.formulae.A.weekendMult}</span>`:`<span class="badge" style="background:var(--surface2);color:var(--text2);">工作日</span>`;
  document.getElementById('m-name').innerHTML=window._state.members.map(m=>`<option value="${m.name}">${m.name}（${m.grade}）</option>`).join('');
  document.getElementById('m-project').innerHTML=`<option value="">— 未指定專案 —</option>`+window._state.projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  document.getElementById('m-start').value='08:00';document.getElementById('m-end').value='18:00';
  updateComputed();renderModalRecords();document.getElementById('modal').classList.add('show')
}
function updateComputed(){
  const s=document.getElementById('m-start').value,e=document.getElementById('m-end').value,nv=document.getElementById('m-name').value;
  if(!s||!e||!activeDay)return;
  const h=tDiff(s,e),mem=window._state.members.find(m=>m.name===nv),g=mem?mem.grade:'B',date=kToD(activeDay);
  const{bonus,note}=calcBonus(h,g,date);
  let txt=`工時 ${h} 小時`;
  if(g==='C')txt+=`　｜　C 級見習 → 補休制度`;
  else{txt+=`　｜　預估獎金 NT$${bonus.toLocaleString()}`;if(note)txt+=`（${note}）`}
  document.getElementById('computed-display').textContent=txt
}
function renderModalRecords(){
  const key=activeDay,date=kToD(key),recs=window._state.records[key]||[];
  if(!recs.length){document.getElementById('modal-records').innerHTML=`<div style="font-size:13px;color:var(--text3);padding:10px 0;">尚無出班記錄，請在下方新增。</div>`;return}
  let html='';
  recs.forEach((r,i)=>{
    const{bonus,note}=calcBonus(r.hours,r.grade,date);
    let bL=gLabel(r.grade);
    if(isWk(date))bL+=` <span class="badge b-amber">假日</span>`;
    if(r.grade==='C')bL+=` <span class="badge b-C">補休</span>`;
    const pn=r.project?pName(r.project):'';
    html+=`<div class="record-item"><div class="record-main"><div class="record-name-row"><span class="record-name">${r.name}</span>${bL}</div><div class="record-meta">${r.startTime} → ${r.endTime}（${r.hours} 小時）${pn?` ｜ <span class="record-project-tag">${pn}</span>`:''}</div>${note?`<div style="font-size:11px;color:var(--amber);margin-top:2px;">${note}</div>`:''}</div><div class="record-pay">${r.grade==='C'?'補休':'NT$'+bonus.toLocaleString()}</div><button class="record-del" onclick="delRecord(${i})">×</button></div>`
  });
  document.getElementById('modal-records').innerHTML=html
}
function addRecord(){
  const nv=document.getElementById('m-name').value,s=document.getElementById('m-start').value,e=document.getElementById('m-end').value,pid=document.getElementById('m-project').value;
  if(!nv||!s||!e)return;
  const h=tDiff(s,e),mem=window._state.members.find(m=>m.name===nv),g=mem?mem.grade:'B';
  if(!window._state.records[activeDay])window._state.records[activeDay]=[];
  if(window._state.records[activeDay].find(r=>r.name===nv)){alert(`${nv} 今天已有記錄，請先刪除舊記錄再新增。`);return}
  window._state.records[activeDay].push({name:nv,grade:g,project:pid,startTime:s,endTime:e,hours:h});
  save();renderModalRecords();renderCalendar()
}
function delRecord(i){window._state.records[activeDay].splice(i,1);save();renderModalRecords();renderCalendar()}
function closeModal(){document.getElementById('modal').classList.remove('show');activeDay=null}
function handleOverlayClick(e){if(e.target===document.getElementById('modal'))closeModal()}

function updateSummaryProjectFilter(){
  const sel=document.getElementById('summary-project-filter'),cur=sel.value;
  sel.innerHTML=`<option value="">全部專案</option>`+window._state.projects.map(p=>`<option value="${p.id}"${p.id===cur?' selected':''}>${p.name}</option>`).join('')
}
function renderSummary(){
  updateSummaryProjectFilter();
  const fpid=document.getElementById('summary-project-filter').value,fn=fpid?pName(fpid):'';
  document.getElementById('active-filter-display').innerHTML=fn?`<span class="active-filter-badge">🎬 ${fn}</span>`:'';
  document.getElementById('summary-table-title').textContent=fn?`${fn} — 人員明細`:'各人員出班明細';
  const byP={};let tH=0,tB=0;const dc=new Set();
  Object.entries(window._state.records).forEach(([key,recs])=>{
    if(!recs.length)return;const date=kToD(key);
    recs.forEach(r=>{
      if(fpid&&r.project!==fpid)return;
      const pn=r.project?pName(r.project):'未指定';
      if(!byP[r.name])byP[r.name]={grade:r.grade,days:new Set(),hours:0,wkH:0,bonus:0,notes:[],projects:new Set()};
      const p=byP[r.name];p.days.add(key);p.hours+=r.hours;if(isWk(date))p.wkH+=r.hours;p.projects.add(pn);
      const{bonus,note}=calcBonus(r.hours,r.grade,date);p.bonus+=bonus;if(note&&!p.notes.includes(note))p.notes.push(note);
      dc.add(key);tH+=r.hours;tB+=bonus
    })
  });
  document.getElementById('summary-stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">出班天數</div><div class="stat-value">${dc.size}</div></div>
    <div class="stat-card"><div class="stat-label">總工時</div><div class="stat-value">${tH.toFixed(1)}<span style="font-size:14px;color:var(--text3);"> h</span></div></div>
    <div class="stat-card"><div class="stat-label">人員數</div><div class="stat-value">${Object.keys(byP).length}</div></div>
    <div class="stat-card"><div class="stat-label">總出班獎金</div><div class="stat-value" style="font-size:20px;color:var(--blue);">NT$${Math.round(tB).toLocaleString()}</div></div>`;
  const rows=Object.entries(byP).sort((a,b)=>b[1].bonus-a[1].bonus).map(([name,p])=>`<tr><td style="font-weight:600;">${name}</td><td>${gLabel(p.grade)}</td><td style="font-size:12px;color:var(--teal);">${[...p.projects].join('、')||'—'}</td><td>${p.days.size}</td><td>${p.hours.toFixed(1)}</td><td>${p.wkH.toFixed(1)}</td><td class="pay-cell">${p.grade==='C'?'—':'NT$'+Math.round(p.bonus).toLocaleString()}</td><td class="note-cell">${p.grade==='C'?'補休制度':p.notes.join('；')||'—'}</td></tr>`).join('');
  document.getElementById('summary-body').innerHTML=rows||`<tr><td colspan="8"><div class="empty-state">${fn?`「${fn}」尚無出班記錄`:'尚無出班記錄'}</div></td></tr>`
}

function switchFormulaTab(g){
  activeFormulaGrade=g;
  ['A','B','C'].forEach(x=>{document.getElementById('ftab-'+x).className='grade-tab'+(g===x?' active-'+x:'')});
  renderFormulaContent()
}
function renderFormulaContent(){
  const g=activeFormulaGrade,el=document.getElementById('formula-content');
  if(g==='C'){el.innerHTML=`<div class="formula-card"><h4>C 級｜見習階段 — 補休制度</h4><p style="font-size:13px;color:var(--text2);line-height:2;">C 級見習人員依現行公司制度執行，<strong>不額外發放獎金</strong>。<br>• 超過 12 小時 → 補休　• 假日出班 → 補休<br>• 累積 3 天（30 小時）且經 Sup 認定後，可升至 B 級。</p></div>`;return}
  const lbl={A:'A 級',B:'B 級'},f=window._state.formulae[g];
  el.innerHTML=`<div class="formula-card"><h4>${lbl[g]}｜固定出班獎金制</h4>
    <div class="f-row"><span class="f-label">全天基本獎金</span><input type="number" class="f-input" id="fi-base" value="${f.baseDay}" min="0" step="100" oninput="previewF('${g}')" /><span class="f-unit">元</span></div>
    <div class="f-row"><span class="f-label">半天門檻（≤ N 小時）</span><input type="number" class="f-input" id="fi-halfmax" value="${f.halfDayMax}" min="1" max="12" step="1" oninput="previewF('${g}')" /><span class="f-unit">小時以內為半天（×0.5）</span></div>
    <div class="f-row"><span class="f-label">全天起算（≥ N 小時）</span><input type="number" class="f-input" id="fi-fullmin" value="${f.fullDayMin}" min="1" max="12" step="1" oninput="previewF('${g}')" /><span class="f-unit">小時以上為全天（×1.0）</span></div>
    <div class="f-row"><span class="f-label">全天工時基準</span><input type="number" class="f-input" id="fi-fullh" value="${f.fullDayHours}" min="6" max="24" step="1" oninput="previewF('${g}')" /><span class="f-unit">小時，超過後每 +1h → 再 +半天獎金</span></div>
    <div class="f-row"><span class="f-label">假日倍率</span><input type="number" class="f-input" id="fi-wkmult" value="${f.weekendMult}" min="1" max="5" step="0.5" oninput="previewF('${g}')" /><span class="f-unit">倍（另補休 1 日）</span></div>
    </div>
    <div class="preview-card"><h4>公式預覽（${lbl[g]}）</h4><div id="formula-preview"></div></div>
    <button class="btn-save" onclick="saveFormula('${g}')">儲存 ${lbl[g]} 公式</button>
    <span class="save-ok" id="save-ok">✓ 已儲存並同步</span>`;
  previewF(g)
}
function previewF(g){
  const base=+document.getElementById('fi-base').value||1000,hm=+document.getElementById('fi-halfmax').value||4,fm=+document.getElementById('fi-fullmin').value||5,fh=+document.getElementById('fi-fullh').value||9,wk=+document.getElementById('fi-wkmult').value||2;
  document.getElementById('formula-preview').innerHTML=`<div class="preview-row">出班 ≤ ${hm} 小時（半天）：<b>NT$${base*0.5}</b></div><div class="preview-row">出班 ${fm}～${fh} 小時（全天）：<b>NT$${base}</b></div><div class="preview-row">出班 ${fh}+1 小時以上（全天＋半天）：<b>NT$${base*1.5}</b></div><div class="preview-row">假日全天：<b>NT$${base*wk}</b>　假日全天＋半天：<b>NT$${base*wk*1.5}</b></div><div class="preview-note">平日 4h→NT$${base*0.5}　平日 9h→NT$${base}　平日 10h→NT$${base*1.5}<br>假日 9h→NT$${base*wk}（補休）　假日 12h→NT$${base*wk*1.5}（補休）</div>`
}
function saveFormula(g){
  window._state.formulae[g].baseDay=+document.getElementById('fi-base').value||1000;
  window._state.formulae[g].halfDayMax=+document.getElementById('fi-halfmax').value||4;
  window._state.formulae[g].fullDayMin=+document.getElementById('fi-fullmin').value||5;
  window._state.formulae[g].fullDayHours=+document.getElementById('fi-fullh').value||9;
  window._state.formulae[g].weekendMult=+document.getElementById('fi-wkmult').value||2;
  save();const s=document.getElementById('save-ok');s.style.display='inline';setTimeout(()=>s.style.display='none',2500);previewF(g)
}

function renderMembers(){
  ['PM','A','B','C'].forEach(g=>{
    const el=document.getElementById('members-'+g);if(!el)return;
    const list=window._state.members.filter(m=>m.grade===g);
    if(!list.length){el.innerHTML=`<div style="font-size:12px;color:var(--text3);padding:4px 0;">尚無人員</div>`;return}
    el.innerHTML=list.map(m=>{const idx=window._state.members.indexOf(m);return`<div class="mcard"><span class="mcard-name">${m.name}</span><button class="mcard-del" onclick="removeMember(${idx})">×</button></div>`}).join('')
  })
}
function addMember(){
  const name=document.getElementById('new-member-name').value.trim(),grade=document.getElementById('new-member-grade').value;
  if(!name||window._state.members.find(m=>m.name===name))return;
  window._state.members.push({name,grade});document.getElementById('new-member-name').value='';save();renderMembers()
}
function removeMember(i){window._state.members.splice(i,1);save();renderMembers()}
document.getElementById('new-member-name').addEventListener('keydown',e=>{if(e.key==='Enter')addMember()});

function renderProjects(){
  const el=document.getElementById('project-grid');
  if(!window._state.projects.length){el.innerHTML=`<div style="font-size:13px;color:var(--text3);padding:8px 0;">尚無專案，請在下方新增。</div>`;return}
  el.innerHTML=window._state.projects.map((p,i)=>{
    let cnt=0;Object.values(window._state.records).forEach(recs=>recs.forEach(r=>{if(r.project===p.id)cnt++}));
    return`<div class="pcard"><div class="pcard-dot" style="background:${pColor(i)};"></div><div class="pcard-info"><div class="pcard-name">${p.name}</div><div class="pcard-count">${cnt} 筆出班記錄</div></div><button class="pcard-del" onclick="removeProject('${p.id}')">×</button></div>`
  }).join('')
}
function addProject(){
  const name=document.getElementById('new-project-name').value.trim();
  if(!name||window._state.projects.find(p=>p.name===name))return;
  window._state.projects.push({id:newPid(),name});document.getElementById('new-project-name').value='';save();renderProjects();updateSummaryProjectFilter()
}
function removeProject(pid){window._state.projects=window._state.projects.filter(p=>p.id!==pid);save();renderProjects();updateSummaryProjectFilter()}
document.getElementById('new-project-name').addEventListener('keydown',e=>{if(e.key==='Enter')addProject()});

function switchSubtab(t){
  activeSubtab=t;
  ['members','projects'].forEach(x=>{document.getElementById('subtab-'+x).classList.toggle('active',x===t);document.getElementById('subpanel-'+x).style.display=x===t?'block':'none'});
  if(t==='members')renderMembers();if(t==='projects')renderProjects()
}
function switchTab(t){
  window._activeTab=t;
  const tabs=['calendar','summary','formula','manage'];
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',tabs[i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='summary')renderSummary();if(t==='formula')renderFormulaContent();if(t==='manage')switchSubtab(activeSubtab)
}

function exportExcel(){
  const wb=XLSX.utils.book_new(),D2=['日','一','二','三','四','五','六'];
  const fpid=document.getElementById('summary-project-filter').value,fn=fpid?pName(fpid):'';
  const detail=[['日期','星期','專案','姓名','等級','開工','收工','工時(h)','是否假日','出班獎金(TWD)','備註']];
  Object.entries(window._state.records).sort().forEach(([key,recs])=>{
    recs.forEach(r=>{
      if(fpid&&r.project!==fpid)return;
      const date=kToD(key),wk=isWk(date),{bonus,note}=calcBonus(r.hours,r.grade,date);
      const pn=r.project?pName(r.project):'未指定',gl=r.grade==='PM'?'PM（A級計算）':r.grade+'級';
      detail.push([key,D2[date.getDay()],pn,r.name,gl,r.startTime,r.endTime,r.hours,wk?'是':'否',r.grade==='C'?'補休':bonus,note||''])
    })
  });
  const ws1=XLSX.utils.aoa_to_sheet(detail);ws1['!cols']=[{wch:13},{wch:5},{wch:18},{wch:10},{wch:14},{wch:8},{wch:8},{wch:9},{wch:9},{wch:14},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws1,'出班明細');
  const byP={};
  Object.entries(window._state.records).forEach(([key,recs])=>{
    const date=kToD(key);
    recs.forEach(r=>{
      if(fpid&&r.project!==fpid)return;
      if(!byP[r.name])byP[r.name]={grade:r.grade,days:new Set(),hours:0,wkH:0,bonus:0,notes:[],projects:new Set()};
      const p=byP[r.name];p.days.add(key);p.hours+=r.hours;if(isWk(date))p.wkH+=r.hours;
      p.projects.add(r.project?pName(r.project):'未指定');
      const{bonus,note}=calcBonus(r.hours,r.grade,date);p.bonus+=bonus;if(note&&!p.notes.includes(note))p.notes.push(note)
    })
  });
  const sumRows=[['姓名','等級','專案','出班天數','總工時(h)','假日工時(h)','應付獎金(TWD)','備註']];
  Object.entries(byP).sort((a,b)=>b[1].bonus-a[1].bonus).forEach(([n,p])=>{
    const gl=p.grade==='PM'?'PM（A級計算）':p.grade+'級';
    sumRows.push([n,gl,[...p.projects].join('、'),p.days.size,+p.hours.toFixed(1),+p.wkH.toFixed(1),p.grade==='C'?'補休制度':Math.round(p.bonus),p.notes.join('；')])
  });
  const ws2=XLSX.utils.aoa_to_sheet(sumRows);ws2['!cols']=[{wch:10},{wch:14},{wch:20},{wch:10},{wch:10},{wch:12},{wch:16},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws2,'人員匯總');
  const fRows=[['等級','全天獎金','半天門檻(h)','全天起算(h)','全天基準(h)','假日倍率','說明']];
  ['A','B'].forEach(g=>{const f=window._state.formulae[g];fRows.push([g+'級',f.baseDay,f.halfDayMax,f.fullDayMin,f.fullDayHours,f.weekendMult+'x','另補休1日'])});
  fRows.push(['C級','—','—','—','—','—','補休制度，不計獎金'],['PM','—','—','—','—','—','套用 A 級公式']);
  const ws3=XLSX.utils.aoa_to_sheet(fRows);ws3['!cols']=[{wch:6},{wch:10},{wch:12},{wch:12},{wch:12},{wch:8},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws3,'公式設定');
  XLSX.writeFile(wb,fn?`電影出班費用_${fn}.xlsx`:'電影出班費用_全部專案.xlsx')
}

renderCalendar();
</script>
